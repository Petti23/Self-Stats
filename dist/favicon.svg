<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Soft-ball yellow-neon radial gradient for 3D sphere look -->
    <radialGradient id="ballGrad" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#f3ff8a" />
      <stop offset="70%" stop-color="#ccff00" />
      <stop offset="100%" stop-color="#99c200" />
    </radialGradient>
    
    <!-- Shadow filter for the text to pop -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Ball body -->
  <circle cx="50" cy="50" r="46" fill="url(#ballGrad)" stroke="#80a300" stroke-width="2.5" />

  <!-- Left seam (red base line) -->
  <path d="M 23,17 Q 41,50 23,83" fill="none" stroke="#b91c1c" stroke-width="1.2" opacity="0.8"/>
  <!-- Left seam stitches -->
  <path d="M 23,17 Q 41,50 23,83" fill="none" stroke="#ef4444" stroke-width="3" stroke-dasharray="2,3.5"/>

  <!-- Right seam (red base line) -->
  <path d="M 77,17 Q 59,50 77,83" fill="none" stroke="#b91c1c" stroke-width="1.2" opacity="0.8"/>
  <!-- Right seam stitches -->
  <path d="M 77,17 Q 59,50 77,83" fill="none" stroke="#ef4444" stroke-width="3" stroke-dasharray="2,3.5"/>

  <!-- Program Initials: "SS" for Self-Stats -->
  <text x="51" y="63.5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="950" font-size="34" fill="#0f172a" filter="url(#shadow)" letter-spacing="-1">SS</text>
</svg>